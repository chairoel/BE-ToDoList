services:
  postgres:
    image: postgres:16-alpine
    container_name: to-do-list-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-todolist}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-todolist}"]
      interval: 5s
      timeout: 5s
      retries: 5

  goose:
    image: ghcr.io/kukymbr/goose-docker:3.27.2
    container_name: to-do-list-goose
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: host=postgres port=5432 user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-todolist} sslmode=disable
      GOOSE_COMMAND: ${GOOSE_COMMAND:-up}
      GOOSE_COMMAND_ARG: ${GOOSE_COMMAND_ARG:-}
    volumes:
      - ./migrations:/migrations
    profiles:
      - tools

volumes:
  postgres_data:
